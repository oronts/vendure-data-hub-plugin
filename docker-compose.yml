version: '3.8'

services:
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: data-hub-meilisearch
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=testMasterKey123
      - MEILI_ENV=development
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meilisearch-data:/meili_data
    networks:
      - data-hub-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  data-hub-network:
    driver: bridge

volumes:
  meilisearch-data:
    driver: local
